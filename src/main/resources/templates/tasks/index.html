<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Booster</title>
</head>
<body>
    <h1>Task Booster</h1>

    <h2>今日のタスク</h2>

    <form action="/tasks" method="post">
        <input type="text" name="title" placeholder="タスクを入力" required>
        <button type="submit">登録</button>
    </form>

    <ul>
        <li th:each="task : ${tasks}">
            <span th:text="${task.id}"></span>:
            <span th:text="${task.title}"></span>
        </li>
    </ul>
    <ul>
        <li th:each="task : ${tasks}">
            <span th:text="${task.id}"></span>:
            <span th:text="${task.title}"></span>

            <form th:action="@{/sessions/start/{taskId}(taskId=${task.id})}" method="post" style="display:inline;">
                <button type="submit">開始</button>
            </form>
        </li>
    </ul>
</body>
</html>
