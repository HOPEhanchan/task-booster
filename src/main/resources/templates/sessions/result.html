<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>結果 - Task Booster</title>
</head>
<body>
    <h1>作業結果</h1>

    <p>タスク：</p>
    <h2 th:text="${focusSession.task.title}"></h2>

    <p>作業時間：</p>
    <p>
        <span th:text="${focusSession.durationMinutes}"></span> 分
    </p>

    <p>集中度：</p>
    <p th:text="${focusSession.focusScore}"></p>

    <p>フィードバック：</p>
    <strong th:text="${focusSession.feedbackMessage}"></strong>

    <br><br>

    <a href="/tasks">タスク一覧に戻る</a>
</body>
</html>
