<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>作業中 - Task Booster</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <main class="container">
    <h1>作業中</h1>

    <p>現在のタスク：</p>
    <h2 th:text="${focusSession.task.title}"></h2>

    <p>開始時刻：</p>
    <p th:text="${focusSession.startedAt}"></p>

    <p>この作業に集中してください。</p>

    <a th:href="@{/sessions/{id}/finish(id=${focusSession.id})}">
        作業を終了する
    </a>

    <br><br>

    <a href="/tasks">タスク一覧に戻る</a>
  </main>
</body>
</html>
